name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-audit:
    name: Build, Test & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (shared packages + mobile)
        run: npx turbo run typecheck --filter=!@beyou/web

      - name: Typecheck web (non-blocking — pre-existing errors, see cleanup task)
        run: npm --workspace @beyou/web run typecheck
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Contract drift check
        run: npm --workspace @beyou/contracts run check

      - name: Audit dependencies (warn only)
        # Doesn't fail the build — npm audit is noisy. Visible in logs.
        run: npm audit --audit-level=high
        continue-on-error: true
