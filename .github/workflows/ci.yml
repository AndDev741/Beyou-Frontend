name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-audit:
    name: Build, Test & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx turbo run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Contract drift check
        run: npm --workspace @beyou/contracts run check

      - name: Audit dependencies (warn only)
        # Doesn't fail the build — npm audit is noisy. Visible in logs.
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: build-test-audit
    timeout-minutes: 30
    steps:
      - name: Checkout frontend (under test)
        uses: actions/checkout@v6
        with:
          path: frontend

      # Cross-repo features: when a sibling repo has a branch with the SAME
      # name as this branch, test against it instead of main — otherwise a
      # frontend change that needs updated specs (or backend) can never go
      # green before the sibling merges. Falls back to main when absent.
      - name: Resolve sibling refs
        id: refs
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          resolve() {
            if [ "$BRANCH" != "main" ] && git ls-remote --exit-code --heads "https://github.com/$1" "$BRANCH" > /dev/null 2>&1; then
              echo "$BRANCH"
            else
              echo "main"
            fi
          }
          E2E_REF=$(resolve AndDev741/Beyou-e2e-tests)
          BACKEND_REF=$(resolve AndDev741/Beyou-backend-spring)
          echo "e2e=$E2E_REF" >> "$GITHUB_OUTPUT"
          echo "backend=$BACKEND_REF" >> "$GITHUB_OUTPUT"
          echo "Using e2e=$E2E_REF backend=$BACKEND_REF (branch: $BRANCH)"

      - name: Checkout e2e tests
        uses: actions/checkout@v6
        with:
          repository: AndDev741/Beyou-e2e-tests
          ref: ${{ steps.refs.outputs.e2e }}
          path: e2e

      - name: Checkout dev-env
        uses: actions/checkout@v6
        with:
          repository: AndDev741/Beyou-dev-env
          ref: main
          path: dev-env

      - name: Checkout backend (matched branch or main)
        uses: actions/checkout@v6
        with:
          repository: AndDev741/Beyou-backend-spring
          ref: ${{ steps.refs.outputs.backend }}
          path: backend

      - name: Build web image (under test)
        run: |
          docker build --target nginx \
            --build-arg VITE_API_URL=http://localhost:8099/api/v1 \
            -t beyou-web:e2e -f ./frontend/apps/web/Dockerfile ./frontend

      - name: Get backend image (pull latest, else build from source)
        run: |
          # A matched backend branch means this frontend needs unreleased backend
          # code — the published :latest (built from main) would fail the specs.
          if [ "${{ steps.refs.outputs.backend }}" != "main" ]; then
            echo "Building backend from matched branch ${{ steps.refs.outputs.backend }}"
            docker build --target runtime -t beyou-backend:e2e ./backend
          elif docker pull ghcr.io/anddev741/beyou-backend:latest; then
            docker tag ghcr.io/anddev741/beyou-backend:latest beyou-backend:e2e
          else
            echo "No published backend image yet — building from main (bootstrap)"
            docker build --target runtime -t beyou-backend:e2e ./backend
          fi

      - name: Boot the stack
        working-directory: dev-env
        run: docker compose -f docker-compose.e2e.yml up -d --wait

      - name: Wait for backend + web to serve
        run: |
          for i in $(seq 1 90); do curl -s -o /dev/null http://localhost:8099 && break; sleep 2; done
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:3000 && break; sleep 2; done

      - name: Run Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          BASE_URL=http://localhost:3000 npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Dump backend logs on failure
        if: failure()
        working-directory: dev-env
        run: docker compose -f docker-compose.e2e.yml logs backend

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: [build-test-audit, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: nginx
          push: true
          build-args: |
            VITE_API_URL=${{ vars.PROD_API_URL }}
            VITE_APP_URL=${{ vars.APP_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
          tags: |
            ghcr.io/anddev741/beyou-web:latest
            ghcr.io/anddev741/beyou-web:sha-${{ env.SHORT_SHA }}
